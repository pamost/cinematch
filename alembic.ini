[alembic]
# Путь к директории с миграциями
script_location = migrations

# URL синхронной БД для миграций
# Alembic требует синхронный драйвер.
# В env.py URL переопределяется через settings.
sqlalchemy.url = postgresql://cinematch:cinematch123@localhost:6432/cinematch

# Логирование (оставляем пустым, используется стандартная конфигурация)
# log_file = /dev/null  # раскомментировать, если нужно подавить логи миграций

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
